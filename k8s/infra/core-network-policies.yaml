# k8s/infra/core-network-policies.yaml

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-only
  namespace: codexa-ai
spec:
  podSelector: {} # Applies to all pods in codexa-ai
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: codexa-ai

---
# 2. NEW POLICY: Allow Previews to talk to MinIO (for file storage)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-previews-to-minio
  namespace: codexa-ai
spec:
  # Target ONLY the MinIO pod (adjust matchLabels if your MinIO pod label is different)
  podSelector:
    matchLabels:
      app: minio # or statefulset.kubernetes.io/pod-name: minio-0
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic FROM the codexa-previews namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: codexa-previews
      # ONLY on port 9000
      ports:
        - protocol: TCP
          port: 9000

---
# 3. NEW POLICY: Allow NGINX Ingress to talk to API Gateway and Proxy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-ingress
  namespace: codexa-ai
spec:
  # This applies to the services Nginx needs to reach
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["api-gateway", "codexa-ai-proxy", "codexa-frontend"] # Add any other services that need to be exposed via Ingress
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic FROM the ingress-nginx namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx