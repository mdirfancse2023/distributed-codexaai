apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: codexa-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434

          command:
            - /bin/sh
            - -c

          args:
            - |
              echo "Starting Ollama server..."
              ollama serve &
              
              echo "Waiting for server..."
              sleep 10
              
              echo "Pulling cloud model..."
              ollama pull deepseek-v3.1:671b-cloud || true
              
              echo "Ollama ready"
              wait

          volumeMounts:
            - name: ollama-auth
              mountPath: /root/.ollama/id_ed25519
              subPath: id_ed25519
            - name: ollama-auth
              mountPath: /root/.ollama/id_ed25519.pub
              subPath: id_ed25519.pub

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

      volumes:
        - name: ollama-auth
          secret:
            secretName: ollama-auth
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: codexa-ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434