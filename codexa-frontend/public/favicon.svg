<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- Bot head -->
  <rect x="30" y="35" width="40" height="35" rx="6" fill="white" opacity="0.95"/>
  
  <!-- Eyes -->
  <circle cx="40" cy="50" r="4" fill="#6366f1"/>
  <circle cx="60" cy="50" r="4" fill="#6366f1"/>
  
  <!-- Mouth/smile -->
  <path d="M 38 60 Q 50 65 62 60" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna -->
  <line x1="50" y1="35" x2="50" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="50" cy="23" r="3" fill="white"/>
  
  <!-- Side details -->
  <rect x="25" y="48" width="3" height="8" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="72" y="48" width="3" height="8" rx="1.5" fill="white" opacity="0.9"/>
</svg>
