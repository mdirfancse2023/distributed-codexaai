databases:
  - name: mental-health-db
    databaseName: codexa
    user: codexa_user
    plan: free

services:
  - type: web
    name: frontend-sgad
    runtime: node
    rootDir: codexa-frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    plan: free
