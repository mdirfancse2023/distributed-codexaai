databases:
  - name: postgres
    databaseName: codexa

services:
  - type: web
    name: frontend
    env: static
    buildCommand: cd codexa-frontend && npm install && npm run build

  - type: pserv
    name: api-gateway
    env: docker
    dockerfilePath: ./Dockerfile

  - type: pserv
    name: merged-backend
    env: docker
    dockerfilePath: ./Dockerfile
