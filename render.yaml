databases:
  - name: mental-health-db
    databaseName: codexa
    user: codexa_user
    plan: free

services:
  - type: web
    name: frontend
    env: static
    buildCommand: cd codexa-frontend && npm install && npm run build
    publishPath: codexa-frontend/dist

  - type: pserv
    name: api-gateway
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free

  - type: pserv
    name: merged-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mental-health-db
          property: connectionString
    plan: free
