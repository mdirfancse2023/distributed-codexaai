services:
  - type: web
    name: frontend-sgad
    runtime: node
    buildCommand: cd codexa-frontend && npm install && npm run build
    startCommand: npx serve -s codexa-frontend/dist -l $PORT

  - type: pserv
    name: api-gateway-sgad
    env: docker
    dockerfilePath: ./Dockerfile

  - type: pserv
    name: merged-backend-sgad
    env: docker
    dockerfilePath: ./Dockerfile
