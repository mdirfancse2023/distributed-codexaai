services:
  - type: web
    name: frontend-sgad
    runtime: node
    rootDir: codexa-frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    plan: free

  - type: web
    name: backend-sgad
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mental-health-db
          property: connectionString
    plan: free
