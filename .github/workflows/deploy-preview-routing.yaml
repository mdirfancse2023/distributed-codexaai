name: Deploy Preview Routing

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/proxy/**'
      - 'k8s/infra/ingress.yaml'
      - 'k8s/infra/namespaces.yaml'

env:
  SERVICE_NAME: codexa-ai-proxy
  IMAGE_NAME: mdirfancse2023/codexa-ai-proxy

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy Preview Routing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Proxy Image
        uses: docker/build-push-action@v6
        with:
          context: ./k8s/proxy
          file: ./k8s/proxy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER }}
          location: ${{ secrets.GCP_ZONE }}

      - name: Apply Preview Routing Manifests
        run: |
          kubectl apply -f k8s/infra/namespaces.yaml
          kubectl apply -f k8s/proxy/proxy-deployment.yaml
          kubectl apply -f k8s/infra/ingress.yaml

      - name: Deploy Proxy to GKE
        run: |
          kubectl set image deployment/${{ env.SERVICE_NAME }} \
          ${{ env.SERVICE_NAME }}=${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n codexa-ai

          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n codexa-ai
